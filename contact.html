<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STUDIO R—M — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #ffffff;
      --light-gray: #b0aeab;
      --mid-gray: #b0aeab;
      --dark: #1a1916;
      --font: 'Roboto', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--white); color: var(--dark); font-size: 17px; line-height: 1.65; overflow-x: hidden; }

    /* NAV */
    nav { position: fixed; top: 0; right: 0; z-index: 100; padding: 22px 28px; }
    .hamburger { cursor: pointer; background: none; border: none; display: flex; flex-direction: column; gap: 5px; padding: 4px; }
    .hamburger span { display: block; width: 26px; height: 1.5px; background: var(--dark); transition: all 0.3s ease; }
    .menu-panel { position: fixed; top: 0; right: -300px; width: 260px; height: 100vh; background: var(--white); box-shadow: -4px 0 30px rgba(0,0,0,0.08); z-index: 200; transition: right 0.4s cubic-bezier(0.77,0,0.175,1); display: flex; flex-direction: column; padding: 28px 32px; }
    .menu-panel.open { right: 0; }
    .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--light-gray); }
    .menu-header span { font-size: 13px; letter-spacing: 0.12em; color: var(--mid-gray); }
    .close-btn { cursor: pointer; background: none; border: none; font-size: 18px; color: var(--dark); line-height: 1; }
    .menu-links { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .menu-links a { font-size: 28px; font-weight: 300; letter-spacing: 0.06em; color: var(--dark); text-decoration: none; padding: 6px 0; transition: color 0.2s; }
    .menu-links a:hover { color: var(--mid-gray); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
    .overlay.visible { opacity: 1; pointer-events: all; }

    /* LAYOUT */
    .split { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
    .left-panel { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; border-right: 1px solid #e0ddd8; overflow: hidden; background: var(--white); }
    .left-panel img { width: auto; height: 80vh; max-width: 90%; object-fit: contain; filter: grayscale(100%) contrast(1.05); opacity: 0.92; }
    .right-panel { padding: 80px 64px 80px 80px; min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; padding-top: 120px; }

    /* TYPOGRAPHY */
    .section-title { font-size: clamp(28px, 3.5vw, 40px); font-weight: 300; letter-spacing: 0.12em; color: var(--light-gray); margin-bottom: 40px; }
    p + p { margin-top: 18px; }
    a.email-link { color: var(--dark); text-decoration: underline; text-underline-offset: 3px; }
    .contact-content { max-width: 560px; }

    /* ANIMATIONS */
    .fade-in { animation: fadeUp 0.7s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in:nth-child(2) { animation-delay: 0.1s; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .split { grid-template-columns: 1fr; }
      .left-panel { position: relative; height: 50vw; min-height: 260px; border-right: none; border-bottom: 1px solid #e0ddd8; }
      .right-panel { padding: 40px 28px; }
    }
  </style>
</head>
<body>

<nav>
  <button class="hamburger" onclick="openMenu()" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="menu-panel" id="menuPanel">
  <div class="menu-header">
    <span>MENU</span>
    <button class="close-btn" onclick="closeMenu()">✕</button>
  </div>
  <div class="menu-links">
    <a href="index.html">HOME</a>
    <a href="services.html">SERVICES</a>
    <a href="contact.html">CONTACT US</a>
  </div>
</div>

<div class="split">
  <div class="left-panel">
    <img src="studior-m.jpg" alt="Studio R—M" onerror="this.style.display='none'">
  </div>
  <div class="right-panel">
    <h2 class="section-title fade-in">CONTACT US</h2>
    <div class="contact-content fade-in">
      <p>More questions? Contact us at <a class="email-link" href="mailto:studiorminquiries@gmail.com">studiorminquiries@gmail.com</a>.</p>
      <p>We typically respond within 1–3 business days.</p>
    </div>
  </div>
</div>

<script>
  function openMenu() { document.getElementById('menuPanel').classList.add('open'); document.getElementById('overlay').classList.add('visible'); }
  function closeMenu() { document.getElementById('menuPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('visible'); }
</script>
</body>
</html>
