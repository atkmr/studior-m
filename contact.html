  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --white: #ffffff; --light-gray: #b0aeab; --mid-gray: #b0aeab; --dark: #1a1916; --font: 'Roboto', sans-serif; }

    @keyframes inkFade { 0% { opacity: 0.45; transform: scale(1) rotate(0deg); } 100% { opacity: 0; transform: scale(0.4) rotate(15deg); } }
    nav { position: fixed; top: 0; right: 0; z-index: 100; padding: 22px 28px; }

    .menu-panel { position: fixed; top: 0; right: -300px; width: 260px; height: 100vh; background: var(--white); box-shadow: -4px 0 30px rgba(0,0,0,0.08); z-index: 200; transition: right 0.4s cubic-bezier(0.77,0,0.175,1); display: flex; flex-direction: column; padding: 28px 32px; }

    .menu-header span { font-size: 13px; letter-spacing: 0.12em; color: var(--mid-gray); }
    .close-btn { cursor: none; background: none; border: none; font-size: 18px; color: var(--dark); line-height: 1; }
    .menu-links { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .menu-links a { font-family: var(--font); font-size: 28px; font-weight: 300; letter-spacing: 0.06em; color: var(--dark); text-decoration: none; padding: 6px 0; transition: color 0.2s; }
    .menu-links a:hover { color: var(--mid-gray); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
    .overlay.visible { opacity: 1; pointer-events: all; }
    .split { display: grid; grid-template-columns: 2fr 3fr; min-height: 100vh; }
    .left-panel { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; border-right: 1px solid #e0ddd8; overflow: hidden; background: var(--white); padding: 48px; }
    .left-panel img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.05); opacity: 0.92; }
    .right-panel { padding: 80px 64px 80px 80px; min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; padding-top: 120px; }
    .section-title { font-family: var(--font); font-size: clamp(28px, 3.5vw, 40px); font-weight: 300; letter-spacing: 0.12em; color: var(--light-gray); margin-bottom: 40px; }
    p + p { margin-top: 18px; }
    a.email-link { color: var(--dark); text-decoration: underline; text-underline-offset: 3px; }
    .contact-content { max-width: 560px; }
    .fade-in { animation: fadeUp 0.7s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in:nth-child(2) { animation-delay: 0.1s; }
    @media (max-width: 900px) {
      .split { grid-template-columns: 1fr; }
      .left-panel { position: relative; height: 50vw; min-height: 260px; border-right: none; border-bottom: 1px solid #e0ddd8; }
      .right-panel { padding: 40px 28px; }
    }
  </style>
</head>
